<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>作業記録</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { color-scheme: light only; }
body {
  background: #ffffff;
  color: #111111;
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 40px;
}

/* ヘッダー */
.header {
  background: #fff;
  border-bottom: 1px solid #ddd;
  padding: 14px 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-title { font-size: 18px; font-weight: bold; }
.header-date { font-size: 12px; color: #888; margin-top: 2px; }

/* タブ */
.tabs {
  display: flex;
  background: #ffffff !important;
  border-bottom: 2px solid #eee;
  position: sticky;
  top: 57px;
  z-index: 19;
}
.tab {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 13px; color: #888; cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
}
.tab.active { color: #007aff; font-weight: bold; border-bottom-color: #007aff; }

/* セクション */
.section { padding: 12px; display: block; background: #ffffff !important; color: #111111 !important; }
.section.hidden { display: none; }
.day-block, .record-row, .record-left { background: #ffffff !important; color: #111111 !important; }

/* ===== 作業開始タブ ===== */

/* 記録中バナー（複数） */
.active-list { margin-bottom: 12px; }
.active-card {
  background: #fff8f0;
  border: 2px solid #f60;
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.active-card-left { flex: 1; }
.active-card-label { font-size: 10px; font-weight: bold; color: #f60; margin-bottom: 2px; }
.active-card-name { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
.active-card-timer { font-size: 20px; font-weight: bold; color: #f60; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
.active-card-btns { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.active-pause-btn {
  background: #ff9500; color: #fff; border: none; border-radius: 8px;
  padding: 8px 12px; font-size: 13px; font-weight: bold;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.active-resume-btn {
  background: #34c759; color: #fff; border: none; border-radius: 8px;
  padding: 8px 12px; font-size: 13px; font-weight: bold;
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.active-card.paused {
  background: #f5f5f5;
  border-color: #aaa;
}
.active-card.paused .active-card-label { color: #888; }
.active-card.paused .active-card-timer { color: #888; }
.pause-note { font-size: 10px; color: #aaa; margin-top: 2px; }
.paused-badge {
  font-size: 10px; color: #fff; background: #aaa;
  border-radius: 4px; padding: 1px 5px; margin-left: 5px; vertical-align: middle;
}

/* マスタ選択エリア */
.start-box {
  background: #fff;
  border-radius: 10px;
  border: 1px solid #ddd;
  overflow: hidden;
  margin-bottom: 12px;
}
.start-box-header {
  padding: 10px 12px;
  font-size: 12px;
  font-weight: bold;
  color: #555;
  background: #f9f9f9;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.select-all-btn {
  font-size: 12px; color: #007aff; background: none;
  border: none; cursor: pointer; font-family: inherit;
}
.master-list { max-height: 280px; overflow-y: auto; }
.master-item {
  display: flex;
  align-items: center;
  padding: 11px 12px;
  border-bottom: 1px solid #f0f0f0;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.master-item:last-child { border-bottom: none; }
.master-item.already-active { opacity: 0.4; pointer-events: none; }
.master-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid #ccc; background: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 14px; transition: all 0.15s;
}
.master-item.checked .master-check {
  background: #007aff; border-color: #007aff; color: #fff;
}
.master-item-name { font-size: 15px; flex: 1; }
.master-item-tag {
  font-size: 10px; color: #fff; background: #f60;
  border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
}

.start-selected-btn {
  display: block; width: 100%; padding: 13px;
  background: #007aff; color: #fff; border: none;
  border-radius: 10px; font-size: 15px; font-weight: bold;
  cursor: pointer; font-family: inherit; margin-bottom: 12px;
}
.start-selected-btn:disabled { background: #aaa; }

/* 直接入力 */
.manual-box {
  background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 12px;
}
.manual-label { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 6px; }
.manual-row { display: flex; gap: 8px; }
.manual-input {
  flex: 1; border: 1px solid #ccc; border-radius: 8px;
  padding: 10px 12px; font-size: 15px; font-family: inherit;
  outline: none; background: #fafafa;
}
.manual-input:focus { border-color: #007aff; background: #fff; }
.manual-btn {
  background: #34c759; color: #fff; border: none; border-radius: 8px;
  padding: 10px 14px; font-size: 13px; font-weight: bold;
  cursor: pointer; white-space: nowrap; font-family: inherit;
}

/* ===== マスタ管理タブ ===== */
.master-manage-list { background: #fff; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; margin-bottom: 12px; }
.master-manage-item {
  display: flex; align-items: center; padding: 12px;
  border-bottom: 1px solid #f0f0f0; gap: 10px;
}
.master-manage-item:last-child { border-bottom: none; }
.manage-name { flex: 1; font-size: 15px; }
.manage-del-btn {
  background: #ff3b30; color: #fff; border: none; border-radius: 6px;
  padding: 5px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
}
.add-master-box {
  background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 12px;
}
.add-master-label { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 6px; }
.add-master-row { display: flex; gap: 8px; }
.add-master-input {
  flex: 1; border: 1px solid #ccc; border-radius: 8px;
  padding: 10px 12px; font-size: 15px; font-family: inherit;
  outline: none; background: #fafafa;
}
.add-master-input:focus { border-color: #007aff; background: #fff; }
.add-master-btn {
  background: #007aff; color: #fff; border: none; border-radius: 8px;
  padding: 10px 14px; font-size: 13px; font-weight: bold;
  cursor: pointer; white-space: nowrap; font-family: inherit;
}

/* ===== 記録一覧 ===== */
.day-block { margin-bottom: 16px; }
.day-heading {
  display: flex; justify-content: space-between;
  font-size: 12px; font-weight: bold; color: #555;
  padding: 4px 0 6px; border-bottom: 1px solid #eee; margin-bottom: 6px;
}
.day-total { color: #007aff; }
.record-row {
  display: flex; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #f0f0f0; gap: 8px;
}
.record-row:last-child { border-bottom: none; }
.record-left { flex: 1; }
.record-name { font-size: 14px; font-weight: bold; margin-bottom: 3px; color: #111; }
.record-time { font-size: 12px; color: #666; }
.record-dur { font-size: 13px; font-weight: bold; color: #007aff; white-space: nowrap; }
.record-dur.active { color: #f60; }
.del-btn {
  background: none; border: none; color: #ccc;
  font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
}

/* ===== 日別集計 ===== */
.day-card { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
.day-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px; cursor: pointer; background: #fafafa; user-select: none;
}
.day-card-date { font-size: 14px; font-weight: bold; }
.day-card-meta { font-size: 12px; color: #888; margin-top: 2px; }
.day-card-total { font-size: 18px; font-weight: bold; color: #007aff; }
.day-card-arrow { font-size: 12px; color: #aaa; margin-left: 8px; display: inline-block; transition: transform 0.2s; }
.day-card.open .day-card-arrow { transform: rotate(180deg); }
.day-card-body { display: none; border-top: 1px solid #eee; padding: 0 12px; }
.day-card.open .day-card-body { display: block; }
.detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #f5f5f5; gap: 8px;
}
.detail-row:last-child { border-bottom: none; }
.detail-name { font-size: 13px; font-weight: bold; margin-bottom: 2px; }
.detail-time { font-size: 11px; color: #888; }
.detail-dur { font-size: 13px; font-weight: bold; color: #007aff; white-space: nowrap; }
.breakdown { margin-top: 10px; padding: 10px 0 4px; border-top: 1px solid #eee; }
.breakdown-title { font-size: 11px; color: #888; font-weight: bold; margin-bottom: 6px; }
.bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.bar-name { font-size: 11px; color: #555; width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.bar-track { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; background: #007aff; border-radius: 3px; }
.bar-pct { font-size: 11px; color: #888; width: 30px; text-align: right; flex-shrink: 0; }

/* ===== エクスポート ===== */
.export-block { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fafafa; }
.export-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
.export-desc { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.5; }
.export-select {
  width: 100%; padding: 8px 10px; border: 1px solid #ccc;
  border-radius: 6px; font-size: 13px; font-family: inherit;
  background: #fff; margin-bottom: 8px;
}
.export-textarea {
  width: 100%; height: 140px; border: 1px solid #ccc; border-radius: 6px;
  padding: 8px; font-size: 11px; font-family: 'Courier New', monospace;
  resize: none; background: #fff; color: #333; margin-bottom: 8px;
}
.ebtn {
  display: block; width: 100%; padding: 11px; border: none;
  border-radius: 8px; font-size: 14px; font-weight: bold;
  font-family: inherit; cursor: pointer; margin-bottom: 6px;
}
.ebtn:last-child { margin-bottom: 0; }
.ebtn-blue { background: #007aff; color: #fff; }
.ebtn-green { background: #34c759; color: #fff; }
.ebtn-yellow { background: #ff9500; color: #fff; }
.ebtn-gray { background: #e5e5ea; color: #333; }
.toast { display: none; text-align: center; font-size: 12px; color: #34c759; font-weight: bold; margin-top: 6px; }
.toast.show { display: block; }

.overlap-badge {
  font-size: 11px; color: #ff6b00; background: #fff3e0;
  border-radius: 4px; padding: 2px 6px; margin-top: 3px;
  display: inline-block;
}

/* タイムライン */
.tl-section { padding: 10px 0 4px; border-bottom: 1px solid #eee; margin-bottom: 8px; }
.tl-title { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 6px; }
.tl-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tl-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #444; }
.tl-legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tl-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 4px; }
.tl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.tl-row-label { font-size: 10px; color: #555; width: 72px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-row-bar { flex: 1; height: 16px; background: #f0f0f0; border-radius: 4px; position: relative; overflow: hidden; }
.tl-bar { position: absolute; top: 2px; height: 12px; border-radius: 3px; opacity: 0.85; }

/* 重複サマリ */
.overlap-section { background: #fff8f0; border: 1px solid #ffd9b0; border-radius: 8px; padding: 10px; margin: 8px 0; }
.overlap-section-title { font-size: 12px; font-weight: bold; color: #f60; margin-bottom: 8px; }
.overlap-row { padding: 6px 0; border-bottom: 1px solid #ffe0b0; }
.overlap-row:last-child { border-bottom: none; }
.overlap-names { font-size: 12px; color: #333; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }
.overlap-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.overlap-time { font-size: 11px; color: #888; }
.overlap-dur { font-weight: bold; color: #f60; }
.detail-section-title { font-size: 11px; font-weight: bold; color: #888; margin: 8px 0 4px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }
.empty-text { font-size: 13px; }
.section-title { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
<style>
  @media (prefers-color-scheme: dark) {
    html, body, .section, .day-block, .record-row, .record-left,
    .header, .tabs, .tab, .start-box, .manual-box, .add-master-box,
    .master-manage-list, .master-item, .day-card, .day-card-header,
    .day-card-body, .detail-row, .export-block, .master-manage-item,
    .tl-section, .tl-row-bar, .breakdown, .detail-section-title {
      background-color: #ffffff !important;
      color: #111111 !important;
    }
    .record-name, .detail-name, .manage-name, .master-item-name,
    .active-card-name, .day-card-date, .header-title, .section-title {
      color: #111111 !important;
    }
    .record-time, .detail-time, .day-card-meta, .header-date,
    .add-master-label, .manual-label, .export-desc {
      color: #555555 !important;
    }
    .day-heading, .start-box-header { color: #444444 !important; background-color: #f5f5f5 !important; }
    .day-card-header { background-color: #f5f5f5 !important; }
    .master-item { border-bottom-color: #dddddd !important; }
    .bar-track { background: #dddddd !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 作業記録</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('start')">作業開始</div>
  <div class="tab" onclick="switchTab('master')">作業管理</div>
  <div class="tab" onclick="switchTab('list')">記録一覧</div>
  <div class="tab" onclick="switchTab('stats')">日別集計</div>
  <div class="tab" onclick="switchTab('export')">出力</div>
</div>

<!-- 作業開始タブ -->
<div class="section" id="tab-start">
  <div class="active-list" id="activeList"></div>

  <div class="section-title">作業を選んで開始</div>
  <div class="start-box">
    <div class="start-box-header">
      <span>作業を選択（複数可）</span>
      <button class="select-all-btn" onclick="clearChecks()">選択解除</button>
    </div>
    <div class="master-list" id="masterSelectList"></div>
  </div>
  <button class="start-selected-btn" id="startSelectedBtn" onclick="startSelected()" disabled>▶ 選択した作業を開始</button>

  <div class="section-title">直接入力で開始</div>
  <div class="manual-box">
    <div class="manual-label">作業内容を直接入力</div>
    <div class="manual-row">
      <input class="manual-input" id="manualInput" type="text" placeholder="作業内容を入力…" maxlength="80"
        onkeydown="if(event.key==='Enter') startManual()">
      <button class="manual-btn" onclick="startManual()">▶ 開始</button>
    </div>
  </div>
</div>

<!-- 作業管理タブ -->
<div class="section hidden" id="tab-master">
  <div class="section-title">登録済み作業</div>
  <div id="masterManageList"></div>
  <div class="section-title">新しい作業を追加</div>
  <div class="add-master-box">
    <div class="add-master-label">作業名</div>
    <div class="add-master-row">
      <input class="add-master-input" id="addMasterInput" type="text" placeholder="作業名を入力…" maxlength="80"
        onkeydown="if(event.key==='Enter') addMaster()">
      <button class="add-master-btn" onclick="addMaster()">追加</button>
    </div>
  </div>
</div>

<!-- 記録一覧タブ -->
<div class="section hidden" id="tab-list"></div>

<!-- 日別集計タブ -->
<div class="section hidden" id="tab-stats"></div>

<!-- 出力タブ -->
<div class="section hidden" id="tab-export">
  <div class="export-block">
    <div class="export-title">📋 テキストでコピー</div>
    <div class="export-desc">メモアプリやメールに貼り付けて保存できます</div>
    <select class="export-select" id="exportRange" onchange="renderExportText()">
      <option value="all">すべての記録</option>
      <option value="today">今日</option>
      <option value="week">直近7日</option>
      <option value="month">今月</option>
    </select>
    <textarea class="export-textarea" id="exportTextarea" readonly placeholder="記録がありません"></textarea>
    <button class="ebtn ebtn-blue" onclick="copyText()">📋 テキストをコピー</button>
    <div class="toast" id="copyToast">コピーしました！</div>
  </div>
  <div class="export-block">
    <div class="export-title">📥 CSVダウンロード</div>
    <div class="export-desc">Excelやスプレッドシートで開けます</div>
    <button class="ebtn ebtn-green" onclick="downloadCSV()">📥 CSVをダウンロード</button>
  </div>
  <div class="export-block">
    <div class="export-title">💾 JSONバックアップ</div>
    <div class="export-desc">すべてのデータを保存・復元できます。Safariのデータ消去前に保存しておくのがおすすめです。</div>
    <button class="ebtn ebtn-yellow" onclick="downloadJSON()">💾 JSONを保存</button>
    <button class="ebtn ebtn-gray" onclick="document.getElementById('importFile').click()">📂 JSONを読み込む</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    <div class="toast" id="importToast">インポートしました！</div>
  </div>
</div>

<script>
var SKEY = 'worklog_v2', AKEY = 'worklog_active_v2', MKEY = 'worklog_master_v2';
var WD = ['日','月','火','水','木','金','土'];
var records = [], activeTasks = [], masterList = [], checkedIds = [];
var timerInterval = null;

function load() {
  try { records = JSON.parse(localStorage.getItem(SKEY)) || []; } catch(e) { records = []; }
  try { activeTasks = JSON.parse(localStorage.getItem(AKEY)) || []; } catch(e) { activeTasks = []; }
  try { masterList = JSON.parse(localStorage.getItem(MKEY)) || []; } catch(e) { masterList = []; }
  // デフォルトマスタ
  if (masterList.length === 0) {
    masterList = [
      { id: mid(), name: 'メール対応' },
      { id: mid(), name: '会議' },
      { id: mid(), name: '資料作成' },
      { id: mid(), name: '電話対応' }
    ];
    saveMaster();
  }
}
function save() { localStorage.setItem(SKEY, JSON.stringify(records)); }
function saveActive() { localStorage.setItem(AKEY, JSON.stringify(activeTasks)); }
function saveMaster() { localStorage.setItem(MKEY, JSON.stringify(masterList)); }
function mid() { return 'm' + Date.now() + Math.random().toString(36).slice(2,6); }
function rid() { return Date.now() + Math.floor(Math.random()*1000); }

function p2(n) { return String(n).padStart(2,'0'); }
function fmtTimer(ms) {
  var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return h>0 ? p2(h)+':'+p2(m)+':'+p2(sec) : p2(m)+':'+p2(sec);
}
function fmtHM(ms) {
  var min=Math.round(ms/60000), h=Math.floor(min/60), m=min%60;
  return h===0 ? m+'分' : (m===0 ? h+'時間' : h+'時間'+m+'分');
}
function fmtClock(ts) { var d=new Date(ts); return p2(d.getHours())+':'+p2(d.getMinutes()); }
function fmtDate(ts) { var d=new Date(ts); return (d.getMonth()+1)+'/'+d.getDate()+'（'+WD[d.getDay()]+'）'; }
function fmtDateFull(ts) { var d=new Date(ts); return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+WD[d.getDay()]+'）'; }
function dateKey(ts) { var d=new Date(ts); return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== 作業開始 =====
function startSelected() {
  if (checkedIds.length === 0) return;
  var now = Date.now();
  checkedIds.forEach(function(id) {
    var m = masterList.find(function(x){return x.id===id;});
    if (!m) return;
    // segments: [{start, end}] で正味時間を管理。pausedAt: 一時停止開始時刻
    activeTasks.push({ aid: rid(), name: m.name, start: now, segments: [{start: now, end: null}], pausedAt: null });
  });
  saveActive();
  checkedIds = [];
  renderMasterSelect();
  renderActiveList();
  updateStartBtn();
  startTimer();
}

function startManual() {
  var input = document.getElementById('manualInput');
  var name = input.value.trim();
  if (!name) return;
  var now = Date.now();
  activeTasks.push({ aid: rid(), name: name, start: now, segments: [{start: now, end: null}], pausedAt: null });
  saveActive();
  input.value = '';
  renderActiveList();
  startTimer();
}

// 正味経過時間を計算（一時停止中の時間を除く）
function calcNetMs(a) {
  var now = Date.now();
  var total = 0;
  (a.segments || [{start: a.start, end: null}]).forEach(function(s) {
    total += (s.end || now) - s.start;
  });
  // 一時停止中は現在のセグメントをカウントしない
  if (a.pausedAt) {
    var last = a.segments[a.segments.length-1];
    total -= (last.end || now) - last.start;
  }
  return total;
}

function pauseActive(aid) {
  var a = activeTasks.find(function(x){return x.aid===aid;});
  if (!a || a.pausedAt) return;
  var now = Date.now();
  a.pausedAt = now;
  // 現在のセグメントを終了
  var last = a.segments[a.segments.length-1];
  if (last && !last.end) last.end = now;
  saveActive();
  renderActiveList();
}

function resumeActive(aid) {
  var a = activeTasks.find(function(x){return x.aid===aid;});
  if (!a || !a.pausedAt) return;
  var now = Date.now();
  a.pausedAt = null;
  // 新しいセグメント開始
  a.segments.push({start: now, end: null});
  saveActive();
  renderActiveList();
}

function stopActive(aid) {
  var idx = activeTasks.findIndex(function(a){return a.aid===aid;});
  if (idx === -1) return;
  var a = activeTasks[idx];
  var now = Date.now();
  // 一時停止中なら再開してから終了
  if (a.pausedAt) { a.pausedAt = null; a.segments.push({start: now, end: now}); }
  var last = a.segments[a.segments.length-1];
  if (last && !last.end) last.end = now;
  var netMs = calcNetMs(a);
  // 正味時間で記録（start=最初の開始、end=start+正味時間）
  var recStart = a.segments[0].start;
  records.unshift({ id: rid(), name: a.name, start: recStart, end: recStart + netMs, realEnd: now, paused: a.segments.length > 1 });
  activeTasks.splice(idx, 1);
  save(); saveActive();
  renderActiveList();
  renderMasterSelect();
  if (activeTasks.length === 0) { clearInterval(timerInterval); timerInterval = null; }
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(function() {
    activeTasks.forEach(function(a) {
      var el = document.getElementById('timer-'+a.aid);
      if (el) el.textContent = fmtTimer(calcNetMs(a));
      var stEl = document.getElementById('status-'+a.aid);
      if (stEl) stEl.textContent = a.pausedAt ? '一時停止中' : '記録中';
    });
  }, 1000);
}

function renderActiveList() {
  var el = document.getElementById('activeList');
  if (!activeTasks.length) { el.innerHTML = ''; return; }
  var html = '';
  activeTasks.forEach(function(a) {
    var isPaused = !!a.pausedAt;
    html += '<div class="active-card'+(isPaused?' paused':'')+'">'
      +'<div class="active-card-left">'
      +'<div class="active-card-label" id="status-'+a.aid+'">'+(isPaused?'⏸ 一時停止中':'⏱ 記録中')+'</div>'
      +'<div class="active-card-name">'+esc(a.name)+'</div>'
      +'<div class="active-card-timer" id="timer-'+a.aid+'">'+fmtTimer(calcNetMs(a))+'</div>'
      +(isPaused?'<div class="pause-note">一時停止中の時間は記録に含まれません</div>':'')
      +'</div>'
      +'<div class="active-card-btns">'
      +(isPaused
        ? '<button class="active-resume-btn" onclick="resumeActive('+a.aid+')">▶ 再開</button>'
        : '<button class="active-pause-btn" onclick="pauseActive('+a.aid+')">⏸ 停止</button>'
      )
      +'<button class="active-stop-btn" onclick="stopActive('+a.aid+')">■ 終了</button>'
      +'</div>'
      +'</div>';
  });
  el.innerHTML = html;
}

function renderMasterSelect() {
  var el = document.getElementById('masterSelectList');
  if (!masterList.length) {
    el.innerHTML = '<div class="empty"><div class="empty-text" style="padding:16px">「作業管理」タブで作業を登録してください</div></div>';
    return;
  }
  var activeNames = activeTasks.map(function(a){return a.name;});
  var html = '';
  masterList.forEach(function(m) {
    var isActive = activeNames.indexOf(m.name) !== -1;
    var isChecked = checkedIds.indexOf(m.id) !== -1;
    html += '<div class="master-item'+(isChecked?' checked':'')+(isActive?' already-active':'')+'" onclick="toggleCheck(\''+m.id+'\')">'
      +'<div class="master-check">'+(isChecked?'✓':'')+'</div>'
      +'<div class="master-item-name">'+esc(m.name)+'</div>'
      +(isActive?'<span class="master-item-tag">記録中</span>':'')
      +'</div>';
  });
  el.innerHTML = html;
}

function toggleCheck(id) {
  var idx = checkedIds.indexOf(id);
  if (idx === -1) checkedIds.push(id);
  else checkedIds.splice(idx, 1);
  renderMasterSelect();
  updateStartBtn();
}

function clearChecks() {
  checkedIds = [];
  renderMasterSelect();
  updateStartBtn();
}

function updateStartBtn() {
  document.getElementById('startSelectedBtn').disabled = checkedIds.length === 0;
}

// ===== マスタ管理 =====
function renderMasterManage() {
  var el = document.getElementById('masterManageList');
  if (!masterList.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">まだ作業が登録されていません</div></div>';
    return;
  }
  var html = '<div class="master-manage-list">';
  masterList.forEach(function(m) {
    html += '<div class="master-manage-item">'
      +'<div class="manage-name">'+esc(m.name)+'</div>'

      +'</div>';
  });

function addMaster() {
  var input = document.getElementById('addMasterInput');
  var name = input.value.trim();
  if (!name) return;
  masterList.push({ id: mid(), name: name });
  saveMaster(); input.value = '';
  renderMasterManage();
  renderMasterSelect();
}

function deleteMaster(id) {
  if (!confirm('この作業を削除しますか？')) return;
  masterList = masterList.filter(function(m){return m.id!==id;});
  saveMaster();
  renderMasterManage();
  renderMasterSelect();

// ===== 記録一覧 =====
function groupByDate(recs) {
  var g = {};
  recs.forEach(function(r) {
    var k = dateKey(r.start);
    if (!g[k]) g[k] = [];
    g[k].push(r);
  });
  return g;
}

function renderList() {
  var sec = document.getElementById('tab-list');
  var all = activeTasks.map(function(a){return {id:'a'+a.aid, name:a.name, start:a.start, end:null};}).concat(records);
  if (!all.length) {
    sec.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">まだ記録がありません</div></div>';
    return;
  }
  var g = groupByDate(all), html = '';
  Object.keys(g).sort(function(a,b){return b.localeCompare(a);}).forEach(function(k) {
    var items = g[k];
    var done = items.filter(function(r){return r.end;});
    var total = done.reduce(function(s,r){return s+(r.end-r.start);},0);
    html += '<div class="day-block"><div class="day-heading"><span>'+fmtDate(items[0].start)+'</span>'
      +(total?'<span class="day-total">合計 '+fmtHM(total)+'</span>':'')+'</div>';
    items.forEach(function(r) {
      var ip = r.end===null;
      // 重複チェック
      var overlaps = done.filter(function(o){
        return o.id!==r.id && o.start < r.end && o.end > r.start;
      });
      var overlapBadge = '';
      if (!ip && overlaps.length > 0) {
        var names = overlaps.map(function(o){return esc(o.name);}).join('・');
        overlapBadge = '<div class="overlap-badge">🔀 同時作業: '+names+'</div>';
      }
      html += '<div class="record-row"><div class="record-left">'
        +'<div class="record-name">'+esc(r.name)+(r.paused?'<span class="paused-badge">一時停止あり</span>':'')+'</div>'
        +'<div class="record-time">'+fmtClock(r.start)+' → '+(ip?'記録中':fmtClock(r.end))+'（正味）</div>'
        +overlapBadge
        +'</div><div class="record-dur'+(ip?' active':'')+'">'+( ip?'…':fmtHM(r.end-r.start))+'</div>'
        +(ip?'':'<button class="del-btn" onclick="deleteRecord('+r.id+')">×</button>')
        +'</div>';
    });
    html += '</div>';
  });
  sec.innerHTML = html;
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(function(r){return r.id!==id;});
  save(); renderList();
}

// ===== 日別集計 =====
var COLORS = ['#007aff','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ffcc00','#ff6b6b'];

function renderStats() {
  var sec = document.getElementById('tab-stats');
  if (!records.length) {
    sec.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">まだデータがありません</div></div>';
    return;
  }
  var g = groupByDate(records), html = '';
  Object.keys(g).sort(function(a,b){return b.localeCompare(a);}).forEach(function(k,idx) {
    var items = g[k].slice().sort(function(a,b){return a.start-b.start;});
    var total = items.reduce(function(s,r){return s+(r.end-r.start);},0);

    // 作業名→色マップ
    var nameList = [];
    items.forEach(function(r){ if(nameList.indexOf(r.name)===-1) nameList.push(r.name); });
    var colorMap = {};
    nameList.forEach(function(n,i){ colorMap[n] = COLORS[i % COLORS.length]; });

    // 重複ペアを検出
    var overlapPairs = [];
    for (var i=0; i<items.length; i++) {
      for (var j=i+1; j<items.length; j++) {
        var a=items[i], b=items[j];
        var os = Math.max(a.start, b.start), oe = Math.min(a.end, b.end);
        if (oe > os) {
          overlapPairs.push({ names: [a.name, b.name], start: os, end: oe, dur: oe-os });
        }
      }
    }

    var oc = idx===0?'open':'';
    html += '<div class="day-card '+oc+'" id="dc-'+k+'">'
      +'<div class="day-card-header" onclick="toggleCard(\''+k+'\')">'
      +'<div><div class="day-card-date">'+fmtDateFull(items[0].start)+'</div>'
      +'<div class="day-card-meta">'+items.length+'件'+(overlapPairs.length?' / 重複'+overlapPairs.length+'件':'')+'</div></div>'
      +'<div style="display:flex;align-items:center">'
      +'<div class="day-card-total">'+fmtHM(total)+'</div>'
      +'<span class="day-card-arrow">▼</span></div></div>'
      +'<div class="day-card-body">';

    // ── タイムライン ──
    var dayStart = items[0].start, dayEnd = items[items.length-1].end;
    var span = dayEnd - dayStart || 1;
    html += '<div class="tl-section"><div class="tl-title">タイムライン</div>'
      +'<div class="tl-legend">';
    nameList.forEach(function(n) {
      html += '<div class="tl-legend-item"><span class="tl-legend-dot" style="background:'+colorMap[n]+'"></span>'+esc(n)+'</div>';
    });
    html += '</div><div class="tl-track">';
    // 時刻ラベル
    html += '<div class="tl-labels">'
      +'<span>'+fmtClock(dayStart)+'</span>'
      +'<span>'+fmtClock(Math.round((dayStart+dayEnd)/2))+'</span>'
      +'<span>'+fmtClock(dayEnd)+'</span>'
      +'</div>';
    // 各作業バー
    items.forEach(function(r, ri) {
      var left = (r.start-dayStart)/span*100;
      var width = Math.max((r.end-r.start)/span*100, 1);
      html += '<div class="tl-row">'
        +'<div class="tl-row-label">'+esc(r.name)+'</div>'
        +'<div class="tl-row-bar">'
        +'<div class="tl-bar" style="left:'+left+'%;width:'+width+'%;background:'+colorMap[r.name]+'" title="'+esc(r.name)+' '+fmtClock(r.start)+'〜'+fmtClock(r.end)+'"></div>'
        +'</div></div>';
    });
    html += '</div></div>';

    // ── 重複サマリ ──
    if (overlapPairs.length) {
      html += '<div class="overlap-section"><div class="overlap-section-title">🔀 同時作業の重複</div>';
      overlapPairs.forEach(function(p) {
        html += '<div class="overlap-row">'
          +'<div class="overlap-names">'
          +'<span class="overlap-dot" style="background:'+colorMap[p.names[0]]+'"></span>'+esc(p.names[0])
          +' <span style="color:#aaa">×</span> '
          +'<span class="overlap-dot" style="background:'+colorMap[p.names[1]]+'"></span>'+esc(p.names[1])
          +'</div>'
          +'<div class="overlap-time">'+fmtClock(p.start)+'〜'+fmtClock(p.end)+' <span class="overlap-dur">'+fmtHM(p.dur)+'</span></div>'
          +'</div>';
      });
      html += '</div>';
    }

    // ── 作業一覧 ──
    html += '<div class="detail-section-title">作業一覧</div>';
    items.forEach(function(r) {
      var hasOverlap = overlapPairs.some(function(p){return p.names.indexOf(r.name)!==-1 && p.start>=r.start && p.end<=r.end;});
      html += '<div class="detail-row">'
        +'<div style="display:flex;align-items:center;gap:6px;flex:1">'
        +'<span class="tl-legend-dot" style="background:'+colorMap[r.name]+'"></span>'
        +'<div><div class="detail-name">'+esc(r.name)+'</div>'
        +'<div class="detail-time">'+fmtClock(r.start)+' → '+fmtClock(r.end)+'</div></div>'
        +'</div>'
        +'<div class="detail-dur">'+fmtHM(r.end-r.start)+'</div></div>';
    });

    // ── 内訳バー ──
    if (nameList.length > 1) {
      html += '<div class="breakdown"><div class="breakdown-title">作業別内訳</div>';
      var tmap = {};
      items.forEach(function(r){ tmap[r.name]=(tmap[r.name]||0)+(r.end-r.start); });
      Object.entries(tmap).sort(function(a,b){return b[1]-a[1];}).forEach(function(t) {
        var pct = Math.round(t[1]/total*100);
        html += '<div class="bar-row">'
          +'<div class="bar-name" title="'+esc(t[0])+'">'+esc(t[0])+'</div>'
          +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+colorMap[t[0]]+'"></div></div>'
          +'<div class="bar-pct">'+pct+'%</div></div>';
      });
      html += '</div>';
    }

    html += '</div></div>';
  });
  sec.innerHTML = html;
}

function toggleCard(k) {
  var el = document.getElementById('dc-'+k);
  if (el) el.classList.toggle('open');
}

// ===== タブ切替 =====
function switchTab(tab) {
  var tabs = ['start','master','list','stats','export'];
  document.querySelectorAll('.tab').forEach(function(el,i) {
    el.classList.toggle('active', tabs[i]===tab);
  });
  tabs.forEach(function(t) {
    document.getElementById('tab-'+t).classList.toggle('hidden', t!==tab);
  });
  if (tab==='master') renderMasterManage();
  if (tab==='list') renderList();
  if (tab==='stats') renderStats();
  if (tab==='export') renderExportText();
}

// ===== エクスポート =====
function getFiltered() {
  var r = document.getElementById('exportRange').value;
  var now = new Date(); now.setHours(0,0,0,0);
  if (r==='today') return records.filter(function(x){return x.start>=now.getTime();});
  if (r==='week')  return records.filter(function(x){return x.start>=now.getTime()-6*86400000;});
  if (r==='month') return records.filter(function(x){return x.start>=new Date(now.getFullYear(),now.getMonth(),1).getTime();});
  return records;
}
function renderExportText() {
  var recs=getFiltered(), ta=document.getElementById('exportTextarea');
  if (!recs.length) { ta.value=''; return; }
  var g=groupByDate(recs), text='';
  Object.keys(g).sort(function(a,b){return b.localeCompare(a);}).forEach(function(k) {
    var items=g[k].slice().sort(function(a,b){return a.start-b.start;});
    var total=items.reduce(function(s,r){return s+(r.end-r.start);},0);
    text += '■ '+fmtDateFull(items[0].start)+'　合計: '+fmtHM(total)+'\n';
    items.forEach(function(r){ text += '  '+fmtClock(r.start)+'〜'+fmtClock(r.end)+'  ['+fmtHM(r.end-r.start)+']  '+r.name+'\n'; });
    text += '\n';
  });
  ta.value = text.trim();
}
function copyText() {
  var ta=document.getElementById('exportTextarea');
  if (!ta.value) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ta.value).then(function(){toast('copyToast');}).catch(function(){ta.select();document.execCommand('copy');toast('copyToast');});
  } else { ta.select(); document.execCommand('copy'); toast('copyToast'); }
}
function toast(id) {
  var el=document.getElementById(id); el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2000);
}
function dateStamp() { var d=new Date(); return d.getFullYear()+p2(d.getMonth()+1)+p2(d.getDate()); }
function downloadCSV() {
  if (!records.length) return;
  var rows=[['日付','作業内容','開始時刻','終了時刻','所要時間（分）']];
  records.slice().sort(function(a,b){return a.start-b.start;}).forEach(function(r) {
    var d=new Date(r.start);
    rows.push([d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate()),r.name,fmtClock(r.start),fmtClock(r.end),Math.round((r.end-r.start)/60000)]);
  });
  var bom='\uFEFF', csv=bom+rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  dl(csv,'text/csv','worklog_'+dateStamp()+'.csv');
}
function downloadJSON() {
  var data = { exported: new Date().toISOString(), records: records, masterList: masterList };
  dl(JSON.stringify(data,null,2),'application/json','worklog_'+dateStamp()+'.json');
}
function importJSON(event) {
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try {
      var data=JSON.parse(e.target.result);
      var imported=data.records||(Array.isArray(data)?data:[]);
      if (!imported.length) { alert('有効なデータが見つかりませんでした'); return; }
      var ids=new Set(records.map(function(r){return r.id;}));
      imported.forEach(function(r){if(!ids.has(r.id))records.push(r);});
      records.sort(function(a,b){return b.start-a.start;});
      if (data.masterList && data.masterList.length) {
        var mids=new Set(masterList.map(function(m){return m.id;}));
        data.masterList.forEach(function(m){if(!mids.has(m.id))masterList.push(m);});
        saveMaster();
      }
      save(); renderList(); renderExportText(); renderMasterSelect(); toast('importToast');
    } catch(e){alert('ファイルの読み込みに失敗しました');}
  };
  reader.readAsText(file); event.target.value='';
}
function dl(content,type,filename) {
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:type}));
  a.download=filename; a.click();
}
function updateDate() {
  var d=new Date();
  document.getElementById('headerDate').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+WD[d.getDay()]+'）';
}

load(); updateDate();
renderActiveList(); renderMasterSelect();
if (activeTasks.length > 0) startTimer();
setInterval(updateDate, 60000);
</script>
